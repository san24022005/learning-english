<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link rel="stylesheet" href="../../static/css/base.css">
    <link rel="stylesheet" href="../../static/css/login.css">
</head>
<body>
    <div class="main">
        <div class="login__header">
            <div class="header__logo">
                <img src="../../static/images/logo.png" alt="Logo">
            </div>
            <div class="header__title">
                <h2>English Vocabulary Learning</h2>
            </div>
        </div>
        <div class="login__container">
            <div class="login__form">
                <h2>Đăng nhập</h2>
                <h3>Chào mừng bạn quay lại!</h3>
                <form method="POST" action="login.html">
                    <div class="form__group">
                        <label for="username">Tên đăng nhập</label>
                        <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required>
                    </div>
                    <div class="form__group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                    </div>
                    <div class="form-support">
                        <div class="form__remeber">
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember">Ghi nhớ tôi</label>
                        </div>
                        <p><a href="/forgot-password">Quên mật khẩu?</a></p>
                    </div>
                    <button type="submit" class="form__submit">Đăng nhập</button>
                </form>
                <div class="login__social">
                    <p>Hoặc đăng nhập bằng</p>
                    <div class="login__so-icon">
                        <a href="./login-gg.html">
                            <img src="../../static/images/google.png" alt="Google">
                        </a>
                        <a href="./login-facebook.html">
                            <img src="../../static/images/facebook.png" alt="Facebook">
                        </a>
                        <a href="./login-apple.html">
                            <img src="../../static/images/apple.png" alt="Apple">
                        </a>
                    </div>
                    <div class="login__register">
                        <p>Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
