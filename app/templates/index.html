<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Xáo Trộn Từ Vựng</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .scrambled { font-size: 30px; letter-spacing: 5px; color: #d35400; font-weight: bold; }
        .meaning { font-size: 20px; color: #7f8c8d; margin-bottom: 20px; }
        #result { margin-top: 20px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <h1>Sắp Xếp Lại Từ Vựng</h1>
    
    <div class="meaning">Nghĩa: <span id="word-meaning">Đang tải...</span></div>
    <div class="scrambled" id="word-scrambled">...</div>
    
    <br>
    <input type="text" id="user-input" placeholder="Gõ từ của bạn vào đây..." autocomplete="off">
    <button onclick="checkAnswer()">Kiểm tra</button>
    <button onclick="loadNewWord()">Từ mới</button>

    <div id="result"></div>

    <script src="{{ url_for('static', filename='js/load-words.js') }}"></script>
</body>
</html>
