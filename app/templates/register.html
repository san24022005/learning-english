<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../static/css/base.css">
    <link rel="stylesheet" href="../static/css/login.css">
</head>
<body>
    <div class="main">
        <div class="login__header">
            <div class="header__logo">
                <img src="../static/images/logo.png" alt="Logo">
            </div>
            <div class="header__title">
                <h2>English Vocabulary Learning</h2>
            </div>
        </div>
        <div class="register__container auth__container grid">
            <div class="login-container__logo">
                <img src="../static/images/logo-2.png" alt="Logo">
            </div>

            <div class="login__form">
                <h2>Đăng ký</h2>
                <h3>Tạo tài khoản mới để bắt đầu học!</h3>
                <form method="POST" action="/register">
                    <div class="form__group">
                        <label for="fullname">Họ và tên</label>
                        <input type="text" id="fullname" name="fullname" placeholder="Nhập họ và tên" required>
                    </div>
                    <div class="form__group">
                        <label for="username">Tên đăng nhập</label>
                        <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required>
                    </div>
                    <div class="form__group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Nhập email" required>
                    </div>
                    <div class="form__group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                    </div>
                    <div class="form__group">
                        <label for="confirm-password">Xác nhận mật khẩu</label>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Nhập lại mật khẩu" required>
                    </div>
                    <button type="submit" class="form__submit">Đăng ký</button>
                </form>
                <div class="login__social">
                    <p class="socail__title">Hoặc đăng ký bằng</p>
                    <div class="login__so-icon">
                        <a href="./login-gg.html">
                            <img src="../static/images/google.png" alt="Google">
                        </a>
                        <a href="./login-facebook.html">
                            <img src="../static/images/facebook.png" alt="Facebook">
                        </a>
                        <a href="./login-apple.html">
                            <img src="../static/images/apple.png" alt="Apple">
                        </a>
                    </div>
                    <div class="login__register">
                        <p>Đã có tài khoản? <a href="login.html" class="login__link">Đăng nhập</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
